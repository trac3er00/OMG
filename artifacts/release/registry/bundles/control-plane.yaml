id: control-plane
kind: skill
version: 2.1.9
title: OMG Control Plane
description: Canonical production control plane bundle for Claude, Codex, Gemini, and Kimi.
hosts:
  - claude
  - codex
  - gemini
  - kimi
assets:
  references:
    - OMG_COMPAT_CONTRACT.md
    - docs/release-checklist.md
invocation_policy:
  user_invocable: true
  model_invocable: false
  allow_implicit_invocation: false
tool_policy:
  side_effect_level: medium
  allowed_tools:
    claude:
      - Read
      - Grep
      - Bash(python3:*)
    codex:
      - Read
      - Grep
      - Bash(python3:*)
lifecycle_hooks:
  native:
    - SessionStart
    - PreToolUse
    - PostToolUse
  emulated:
    - PreCompact
    - WorktreeCreate
    - WorktreeRemove
mcp_contract:
  servers:
    - omg-control
    - omg-memory
  prompts:
    - omg_contract_summary
  resources:
    - resource://omg/contract
    - resource://omg/release-checklist
lsp_contract:
  languages:
    - python
    - typescript
evidence_outputs:
  artifacts:
    - .omg/evidence/control-plane-compile.json
execution_contract:
  modes:
    - embedded
    - local_supervisor
policy_model:
  trust_tiers:
    - name: safe
      level: 0
      label: Safe
      allowed_sources:
        - local_repo
        - trusted_registry
    - name: balanced
      level: 1
      label: Balanced
      allowed_sources:
        - local_repo
        - trusted_registry
        - reviewed_external
    - name: interop
      level: 2
      label: Interop
      allowed_sources:
        - local_repo
        - trusted_registry
        - reviewed_external
        - migration_bridge
    - name: labs
      level: 3
      label: Labs
      allowed_sources:
        - local_repo
        - trusted_registry
        - reviewed_external
        - experimental
  tool_policies:
    - tool_name: Read
      allowed_tiers: [safe, balanced, interop, labs]
      requires_approval: false
    - tool_name: Grep
      allowed_tiers: [safe, balanced, interop, labs]
      requires_approval: false
    - tool_name: Bash(python3:*)
      allowed_tiers: [balanced, interop, labs]
      requires_approval: true
  protected_paths:
    - path_pattern: .omg/**
      required_tier: balanced
    - path_pattern: .agents/**
      required_tier: balanced
    - path_pattern: .codex/**
      required_tier: balanced
    - path_pattern: .claude/**
      required_tier: balanced
  evidence_contract:
    timestamp: timestamp
    executor: executor
    trace_id: trace_id
    lineage: lineage
    attestation_statement: attestation_statement
    attestation_verifier: attestation_verifier
    claim_judge_verdict: claim_judge_verdict
    compliance_verdict: compliance_verdict
  host_rules:
    claude:
      compilation_targets:
        - .claude-plugin/plugin.json
        - .claude-plugin/marketplace.json
        - .mcp.json
        - settings.json
      hooks:
        - SessionStart
        - PreToolUse
        - PostToolUse
        - PreCompact
      subagents:
        - local_supervisor
        - workers
      skills:
        - omg/control-plane
        - omg/hook-governor
    codex:
      compilation_targets:
        - .agents/skills/omg/<bundle>/SKILL.md
        - .agents/skills/omg/<bundle>/openai.yaml
        - .agents/skills/omg/AGENTS.fragment.md
        - .agents/skills/omg/codex-mcp.toml
      skills:
        - omg/control-plane
        - omg/mcp-fabric
      agents_fragments:
        - .agents/skills/omg/AGENTS.fragment.md
      rules:
        - protected_paths
        - explicit_invocation
      automations:
        - contract-compile
        - release-readiness
    gemini:
      compilation_targets:
        - .gemini/settings.json
      mcp:
        - omg-control
      skills:
        - omg/control-plane
      automations:
        - contract-compile
        - release-readiness
    kimi:
      compilation_targets:
        - .kimi/mcp.json
      mcp:
        - omg-control
      skills:
        - omg/control-plane
      automations:
        - contract-compile
        - release-readiness
channel_overrides:
  public:
    posture: self-serve
  enterprise:
    posture: managed
