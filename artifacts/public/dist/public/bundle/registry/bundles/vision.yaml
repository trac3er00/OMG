id: vision
kind: domain-pack
version: 2.1.9
title: OMG Vision Pack
description: Vision-specific OCR, comparison, lineage, drift, and replay attachments.
hosts:
  - claude
  - codex
assets:
  references:
    - runtime/domain_packs.py
invocation_policy:
  user_invocable: true
  model_invocable: true
  allow_implicit_invocation: false
tool_policy:
  side_effect_level: medium
  allowed_tools:
    claude:
      - Read
    codex:
      - Read
lifecycle_hooks:
  native:
    - PostToolUse
  emulated:
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
evidence_outputs:
  artifacts:
    - .omg/lineage/*.json
execution_contract:
  modes:
    - embedded
    - local_supervisor
channel_overrides:
  public:
    drift_checks: advisory
  enterprise:
    drift_checks: required
