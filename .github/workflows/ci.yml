name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: PATH=/home/claw/.bun/bin:$PATH bun test src/agents/

      - name: Typecheck
        run: PATH=/home/claw/.bun/bin:$PATH bunx tsc --noEmit
