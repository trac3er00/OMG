name: OMG Artifact Self-Audit

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      sha:
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      version:
        description: "Version to audit (e.g. 2.2.8)"
        required: true
        type: string

jobs:
  artifact-self-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Install Node dependencies
        run: npm ci

      - name: Audit source tree identity
        run: >
          python3 scripts/audit-published-artifact.py
          --version "${{ inputs.version }}"
          --source-tree .
          --output-json artifacts/audit/source-tree-audit.json

      - name: Create npm pack artifact
        run: npm pack

      - name: Unpack and audit npm tarball
        run: |
          VERSION="${{ inputs.version }}"
          TARBALL=$(ls trac3er-oh-my-god-*.tgz)
          mkdir -p artifacts/npm-unpack
          tar -xzf "$TARBALL" -C artifacts/npm-unpack
          python3 scripts/audit-published-artifact.py \
            --version "$VERSION" \
            --source-tree artifacts/npm-unpack/package \
            --output-json artifacts/audit/npm-pack-audit.json

      - name: Create and audit git archive tarball
        run: |
          VERSION="${{ inputs.version }}"
          mkdir -p artifacts
          git archive --format=tar.gz --prefix="omg-v${VERSION}/" HEAD > artifacts/git-archive.tar.gz
          mkdir -p artifacts/git-unpack
          tar -xzf artifacts/git-archive.tar.gz -C artifacts/git-unpack
          python3 scripts/audit-published-artifact.py \
            --version "$VERSION" \
            --source-tree "artifacts/git-unpack/omg-v${VERSION}" \
            --output-json artifacts/audit/git-tarball-audit.json

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifact-self-audit
          path: artifacts/audit/
          if-no-files-found: error
