name: OMG Nightly Provider Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  nightly-provider-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Prepare artifacts directory
        run: mkdir -p artifacts

      - name: Typecheck
        run: bun run typecheck

      - name: Run test suite
        run: bun test

      - name: Check runtime cleanliness
        run: bun run check:runtime-clean

      - name: Pack npm tarball
        run: npm pack --ignore-scripts | tee artifacts/npm-pack.txt

      - name: Smoke install packed tarball
        run: |
          TARBALL="$(tail -n 1 artifacts/npm-pack.txt)"
          test -n "$TARBALL"
          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          npm init -y >/dev/null 2>&1
          npm install "$GITHUB_WORKSPACE/$TARBALL"

      - name: Capture provider status
        run: bun scripts/omg.ts providers status --smoke --host-mode claude_dispatch > artifacts/provider-status.json

      - name: Capture provider smoke matrix
        continue-on-error: true
        run: bun scripts/omg.ts providers smoke --provider all --host-mode claude_dispatch > artifacts/provider-smoke.json

      - name: Upload nightly smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omg-nightly-provider-smoke
          path: artifacts/
          if-no-files-found: error
