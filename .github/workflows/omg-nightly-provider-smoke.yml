name: OMG Nightly Provider Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  nightly-provider-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest fastmcp starlette pyyaml

      - name: Prepare artifacts directory
        run: mkdir -p artifacts

      - name: Capture provider status
        run: python3 scripts/omg.py providers status --smoke --host-mode claude_dispatch > artifacts/provider-status.json

      - name: Capture provider smoke matrix
        continue-on-error: true
        run: python3 scripts/omg.py providers smoke --provider all --host-mode claude_dispatch > artifacts/provider-smoke.json

      - name: Run qualification smoke suites
        run: python3 -m pytest -q tests/e2e/test_runtime_long_horizon.py tests/performance/test_runtime_stress_budget.py > artifacts/qualification-smoke.txt

      - name: Upload nightly smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omg-nightly-provider-smoke
          path: artifacts/
          if-no-files-found: error
