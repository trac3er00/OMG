name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    env:
      OMG_APP_ID: ${{ vars.OMG_APP_ID || vars.GITHUB_APP_ID }}
      OMG_APP_PRIVATE_KEY: ${{ secrets.OMG_APP_PRIVATE_KEY || secrets.GITHUB_APP_PRIVATE_KEY }}
      OMG_APP_INSTALLATION_ID: ${{ vars.OMG_APP_INSTALLATION_ID || vars.GITHUB_INSTALLATION_ID }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Validate required release credentials
        run: |
          test -n "${NPM_TOKEN}" || (echo "Missing NPM_TOKEN" && exit 1)
          if [ -n "${OMG_APP_ID}" ] || [ -n "${OMG_APP_PRIVATE_KEY}" ] || [ -n "${OMG_APP_INSTALLATION_ID}" ]; then
            test -n "${OMG_APP_ID}" || (echo "Missing OMG_APP_ID (or legacy GITHUB_APP_ID)" && exit 1)
            test -n "${OMG_APP_PRIVATE_KEY}" || (echo "Missing OMG_APP_PRIVATE_KEY (or legacy GITHUB_APP_PRIVATE_KEY)" && exit 1)
            test -n "${OMG_APP_INSTALLATION_ID}" || (echo "Missing OMG_APP_INSTALLATION_ID (or legacy GITHUB_INSTALLATION_ID)" && exit 1)
            echo "Using GitHub App auth for release"
          else
            echo "Using default Actions GITHUB_TOKEN fallback for release"
          fi

      - name: Create GitHub App token
        if: env.OMG_APP_ID != '' && env.OMG_APP_PRIVATE_KEY != '' && env.OMG_APP_INSTALLATION_ID != ''
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.OMG_APP_ID }}
          private-key: ${{ env.OMG_APP_PRIVATE_KEY }}
          installation-id: ${{ env.OMG_APP_INSTALLATION_ID }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Install Node dependencies
        run: npm ci

      - name: Run release readiness checks
        env:
          OMG_REQUIRE_HOST_PARITY_REPORT: "1"
          OMG_REQUIRE_EXEC_KERNEL_EVIDENCE: "1"
          OMG_REQUIRE_GOVERNED_TOOL_EVIDENCE: "1"
          OMG_REQUIRE_TRUSTED_POLICY_PACKS: "1"
          OMG_RELEASE_READY_PROVIDERS: claude,codex,gemini,kimi
        run: |
          python3 scripts/sync-release-identity.py --check
          python3 scripts/omg.py release audit --artifact --format json --output-json artifacts/release/release-audit.json
          python3 scripts/omg.py release readiness --channel dual --output-root artifacts/release

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: npx semantic-release
