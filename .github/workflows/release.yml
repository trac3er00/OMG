name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    env:
      OMG_GITHUB_TOKEN: ${{ secrets.OMG_GITHUB_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Validate required release credentials
        run: |
          test -n "${OMG_GITHUB_TOKEN}" || (echo "Missing OMG_GITHUB_TOKEN" && exit 1)
          test -n "${NPM_TOKEN}" || (echo "Missing NPM_TOKEN" && exit 1)

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ env.OMG_GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Install Node dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "oh-my-god-bot"
          git config user.email "oh-my-god-bot@users.noreply.github.com"

      - name: Run release readiness checks
        env:
          OMG_REQUIRE_HOST_PARITY_REPORT: "1"
          OMG_REQUIRE_EXEC_KERNEL_EVIDENCE: "1"
          OMG_REQUIRE_GOVERNED_TOOL_EVIDENCE: "1"
          OMG_REQUIRE_TRUSTED_POLICY_PACKS: "1"
          OMG_RELEASE_READY_PROVIDERS: claude,codex,gemini,kimi
        run: |
          python3 scripts/sync-release-identity.py --check
          python3 scripts/omg.py release readiness --channel dual --output-root artifacts/release

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ env.OMG_GITHUB_TOKEN }}
          GH_TOKEN: ${{ env.OMG_GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: npx semantic-release
