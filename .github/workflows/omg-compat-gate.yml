name: OMG Compat Gate

on:
  workflow_dispatch:
  pull_request:

jobs:
  compat-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Prepare compatibility artifacts directory
        run: mkdir -p artifacts

      - name: OMG compatibility GA gate
        run: bun scripts/omg.ts compat gate --max-bridge 0 --output artifacts/omg-compat-gap.json

      - name: Export contract snapshot
        run: bun scripts/omg.ts compat snapshot --output artifacts/omg-compat-contracts.json

      - name: Check committed snapshot drift
        run: bun scripts/check-omg-compat-contract-snapshot.ts

      - name: Check standalone naming hygiene
        run: bun scripts/check-omg-standalone-clean.ts

      - name: Run regression tests
        run: bun test

      - name: Upload compatibility artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omg-compat-artifacts
          path: artifacts/
          if-no-files-found: error
