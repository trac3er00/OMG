name: OMG Compat Gate

on:
  workflow_dispatch:
    inputs:
      FORBID_VERSION:
        description: "Previous release version to block from residue checks"
        required: true
        type: string
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-compat-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            setup.cfg
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Verify canonical release identity
        run: python3 scripts/sync-release-identity.py --check

      - name: Prepare compatibility artifacts directory
        run: mkdir -p artifacts

      - name: OMG compatibility GA gate
        run: python3 scripts/omg.py compat gate --max-bridge 0 --output artifacts/omg-compat-gap.json

      - name: Plugin interop diagnostics (advisory)
        continue-on-error: true
        run: python3 scripts/omg.py diagnose-plugins --format json

      - name: Export contract snapshot
        run: python3 scripts/omg.py compat snapshot --output artifacts/omg-compat-contracts.json

      - name: Check committed snapshot drift
        run: python3 scripts/check-omg-compat-contract-snapshot.py --strict-version

      - name: Validate canonical contract registry
        run: python3 scripts/omg.py contract validate

      - name: Capture doctor output
        run: |
          mkdir -p artifacts/public/.omg/evidence
          python3 scripts/omg.py doctor --format json > artifacts/public/.omg/evidence/doctor.json

      - name: Seed release-readiness fixtures for compat gate
        run: python3 scripts/prepare-release-proof-fixtures.py --output-root artifacts/public

      - name: Upload compat foundation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compat-foundation
          path: artifacts
          if-no-files-found: error

  compile-public-compat:
    runs-on: ubuntu-latest
    needs: prepare-compat-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            setup.cfg
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Download compat foundation artifacts
        uses: actions/download-artifact@v4
        with:
          name: compat-foundation
          path: artifacts

      - name: Compile public canonical-parity artifacts
        run: |
          HOST_FLAGS="$(python3 -c 'from runtime.canonical_surface import get_canonical_hosts; print(" ".join(f"--host {host}" for host in get_canonical_hosts()))')"
          python3 scripts/omg.py contract compile ${HOST_FLAGS} --channel public --output-root artifacts/public

      - name: Upload compat compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compat-public-compiled
          path: artifacts
          if-no-files-found: error

  emit-compat-host-parity:
    runs-on: ubuntu-latest
    needs: compile-public-compat
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            setup.cfg
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Download compat compiled artifacts
        uses: actions/download-artifact@v4
        with:
          name: compat-public-compiled
          path: artifacts

      - name: Emit host semantic parity report
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          from runtime.host_parity import check_parity, emit_parity_report

          run_id = os.environ.get("GITHUB_RUN_ID", "compat-gate")
          output_root = Path("artifacts/public")

          def _load_json(path: Path) -> dict:
              payload = json.loads(path.read_text(encoding="utf-8"))
              if not isinstance(payload, dict):
                  raise SystemExit(f"expected JSON object in {path}")
              return payload

          outputs = {
              "claude": {
                  "output": {
                      "status": "ok",
                      "compiled": True,
                  },
                  "source": {
                      "kind": "compiled_artifact",
                      "artifact_path": "settings.json",
                  },
                  "exit_code": 0,
              },
              "codex": {
                  "output": {
                      "status": "ok",
                      "compiled": True,
                  },
                  "source": {
                      "kind": "compiled_artifact",
                      "artifact_path": ".agents/skills/omg/AGENTS.fragment.md",
                  },
                  "exit_code": 0,
              },
              "gemini": {
                  "output": {
                      "status": "ok",
                      "compiled": True,
                  },
                  "source": {
                      "kind": "compiled_artifact",
                      "artifact_path": ".gemini/settings.json",
                  },
                  "exit_code": 0,
              },
              "kimi": {
                  "output": {
                      "status": "ok",
                      "compiled": True,
                  },
                  "source": {
                      "kind": "compiled_artifact",
                      "artifact_path": ".kimi/mcp.json",
                  },
                  "exit_code": 0,
              },
          }

          # Hard requirement: parity must be backed by real compiled host artifacts.
          _load_json(output_root / "settings.json")
          (output_root / ".agents" / "skills" / "omg" / "AGENTS.fragment.md").read_text(encoding="utf-8")
          _load_json(output_root / ".gemini" / "settings.json")
          _load_json(output_root / ".kimi" / "mcp.json")

          result = check_parity(outputs, context={"gate": "compat-workflow"})
          emit_parity_report(run_id, result, project_dir=str(output_root))
          if not result.passed:
              raise SystemExit(f"host semantic parity drift detected: {result.drift_details}")
          PY

      - name: Upload compat parity artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compat-host-parity
          path: artifacts
          if-no-files-found: error

  pr-analyze:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - prepare-compat-gate
      - compile-public-compat
      - emit-compat-host-parity
    permissions:
      contents: read
    steps:
      - name: Checkout PR analysis surface
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            setup.cfg
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Download assembled compat artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: compat-*
          path: artifacts
          merge-multiple: true

      - name: Build reviewer bot handoff from cached artifacts
        run: |
          python3 scripts/github_review_helpers.py build-pr-handoff \
            --event-path "$GITHUB_EVENT_PATH" \
            --artifacts-root artifacts \
            --output artifacts/reviewer/review-input.json

      - name: Enforce fast PR blockers from cached artifacts
        run: python3 scripts/github_review_helpers.py assert-pass --input artifacts/reviewer/review-input.json

      - name: Upload reviewer bot handoff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewer-bot-pr-input
          path: artifacts/reviewer/review-input.json
          if-no-files-found: error

  post-review:
    if: github.event_name == 'pull_request' && always()
    runs-on: ubuntu-latest
    needs: pr-analyze
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout trusted base surface
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            setup.cfg
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Download reviewer bot handoff artifact
        uses: actions/download-artifact@v4
        with:
          name: reviewer-bot-pr-input
          path: artifacts/reviewer

      - name: Post trusted PR review via GitHub App
        run: |
          python3 scripts/github_review_helpers.py post-review \
            --event-path "$GITHUB_EVENT_PATH" \
            --input artifacts/reviewer/review-input.json \
            --output artifacts/reviewer/review-result.json
        env:
          GITHUB_APP_ID: ${{ secrets.GITHUB_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          GITHUB_INSTALLATION_ID: ${{ secrets.GITHUB_INSTALLATION_ID }}

      - name: Upload reviewer bot result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewer-bot-pr-result
          path: artifacts/reviewer
          if-no-files-found: error

  compat-gate:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - compile-public-compat
      - emit-compat-host-parity
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            setup.cfg
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Download assembled compat artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: compat-*
          path: artifacts
          merge-multiple: true

      - name: Run release readiness gate for public channel
        run: |
          READY_PROVIDERS="$(python3 -c 'from runtime.canonical_surface import get_canonical_hosts; print(",".join(get_canonical_hosts()))')"
          OMG_REQUIRE_HOST_PARITY_REPORT=1 \
          OMG_REQUIRE_EXEC_KERNEL_EVIDENCE=1 \
          OMG_REQUIRE_GOVERNED_TOOL_EVIDENCE=1 \
          OMG_RELEASE_READY_PROVIDERS="${READY_PROVIDERS}" \
            python3 scripts/omg.py release readiness --channel public --output-root artifacts/public > artifacts/omg-release-readiness-public.json

      - name: Run host parity regression tests
        run: python3 -m pytest tests/runtime/test_host_parity.py -q

      - name: Check standalone naming hygiene
        run: python3 scripts/check-omg-standalone-clean.py

      - name: Check public-readiness hygiene
        run: python3 scripts/check-omg-public-ready.py

      - name: Run regression tests
        run: python3 -m pytest -q

      - name: Validate full release identity
        run: python3 scripts/validate-release-identity.py --scope all --forbid-version "${{ inputs.FORBID_VERSION }}"

      - name: Pack compatibility artifacts
        run: tar -czf omg-compat-artifacts.tar.gz -C artifacts .

      - name: Upload compatibility artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omg-compat-artifacts
          path: omg-compat-artifacts.tar.gz
          if-no-files-found: error

  standalone-no-vendor:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            setup.cfg
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Validate standalone no-vendor behavior
        run: ./scripts/verify-standalone.sh
