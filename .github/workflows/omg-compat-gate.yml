name: OMG Compat Gate

on:
  workflow_dispatch:
    inputs:
      FORBID_VERSION:
        description: "Previous release version to block from residue checks"
        required: true
        type: string
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-pr:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && contains(github.event.comment.body, '@omg')
    runs-on: ubuntu-latest
    outputs:
      pr-number: ${{ steps.pr.outputs.pr_number }}
      head-sha: ${{ steps.pr.outputs.head_sha }}
      base-sha: ${{ steps.pr.outputs.base_sha }}
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Acknowledge trigger
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Fetch PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            if (pr.data.state !== 'open') {
              core.setFailed('PR is not open');
              return;
            }
            core.setOutput('pr_number', pr.data.number);
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('base_sha', pr.data.base.sha);

  prepare-compat-gate:
    if: always() && (needs.resolve-pr.result == 'success' || github.event_name == 'workflow_dispatch')
    needs:
      - resolve-pr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.head-sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Verify canonical release identity
        run: python3 scripts/sync-release-identity.py --check

      - name: Prepare compatibility artifacts directory
        run: mkdir -p artifacts

      - name: OMG compatibility GA gate
        run: python3 scripts/omg.py compat gate --max-bridge 0 --output artifacts/omg-compat-gap.json

      - name: Plugin interop diagnostics (advisory)
        continue-on-error: true
        run: python3 scripts/omg.py diagnose-plugins --format json || echo "::warning::Plugin interop diagnostics failed"

      - name: Export contract snapshot
        run: python3 scripts/omg.py compat snapshot --output artifacts/omg-compat-contracts.json

      - name: Check committed snapshot drift
        run: python3 scripts/check-omg-compat-contract-snapshot.py --strict-version

      - name: Validate canonical contract registry
        run: python3 scripts/omg.py contract validate

      - name: Capture doctor output
        run: |
          mkdir -p artifacts/public/.omg/evidence
          python3 scripts/omg.py doctor --format json > artifacts/public/.omg/evidence/doctor.json

      - name: Seed release-readiness fixtures for compat gate
        run: python3 scripts/prepare-release-proof-fixtures.py --output-root artifacts/public

      - name: Sanitize colon filenames for upload
        run: find artifacts -type f -name '*:*' -delete 2>/dev/null || true

      - name: Upload compat foundation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compat-foundation
          path: artifacts
          if-no-files-found: error
          include-hidden-files: true

  compile-and-parity-compat:
    runs-on: ubuntu-latest
    if: always() && (needs.resolve-pr.result == 'success' || github.event_name == 'workflow_dispatch')
    needs:
      - resolve-pr
      - prepare-compat-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.head-sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Download compat foundation artifacts
        uses: actions/download-artifact@v4
        with:
          name: compat-foundation
          path: artifacts

      - name: Compile public canonical-parity artifacts
        run: |
          HOST_FLAGS="$(python3 -c 'from runtime.canonical_surface import get_canonical_hosts; print(" ".join(f"--host {host}" for host in get_canonical_hosts()))')"
          python3 scripts/omg.py contract compile ${HOST_FLAGS} --channel public --output-root artifacts/public

      - name: Emit host semantic parity report
        run: python3 scripts/emit_host_parity.py --output-root artifacts/public --gate compat

      - name: Sanitize colon filenames for upload
        run: find artifacts -type f -name '*:*' -delete 2>/dev/null || true

      - name: Upload compat compiled + parity artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compat-public-compiled
          path: artifacts
          if-no-files-found: error
          include-hidden-files: true

  pr-analyze:
    if: always() && needs.resolve-pr.result == 'success'
    runs-on: ubuntu-latest
    needs:
      - resolve-pr
      - prepare-compat-gate
      - compile-and-parity-compat
    permissions:
      contents: read
    steps:
      - name: Checkout PR analysis surface
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.head-sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Download assembled compat artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: compat-*
          path: artifacts
          merge-multiple: true

      - name: Run generated-doc drift check
        run: python3 scripts/omg.py docs generate --check

      - name: Synthesize PR event
        run: |
          cat > /tmp/pr-event.json <<'EVEOF'
          {
            "action": "comment_triggered",
            "repository": {"full_name": "${{ github.repository }}"},
            "pull_request": {
              "number": ${{ needs.resolve-pr.outputs.pr-number }},
              "head": {"sha": "${{ needs.resolve-pr.outputs.head-sha }}"},
              "base": {"sha": "${{ needs.resolve-pr.outputs.base-sha }}"}
            }
          }
          EVEOF

      - name: Build reviewer bot handoff from cached artifacts
        run: |
          python3 scripts/github_review_helpers.py build-pr-handoff \
            --event-path "/tmp/pr-event.json" \
            --artifacts-root artifacts \
            --output artifacts/reviewer/review-input.json

      - name: Enforce fast PR blockers from cached artifacts
        run: python3 scripts/github_review_helpers.py assert-pass --input artifacts/reviewer/review-input.json

      - name: Upload reviewer bot handoff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewer-bot-pr-input
          path: artifacts/reviewer/review-input.json
          if-no-files-found: error

  post-review:
    if: always() && needs.resolve-pr.result == 'success'
    runs-on: ubuntu-latest
    needs:
      - resolve-pr
      - pr-analyze
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout trusted base surface
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.base-sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Download reviewer bot handoff artifact
        uses: actions/download-artifact@v4
        with:
          name: reviewer-bot-pr-input
          path: artifacts/reviewer

      - name: Synthesize PR event
        run: |
          cat > /tmp/pr-event.json <<'EVEOF'
          {
            "action": "comment_triggered",
            "repository": {"full_name": "${{ github.repository }}"},
            "pull_request": {
              "number": ${{ needs.resolve-pr.outputs.pr-number }},
              "head": {"sha": "${{ needs.resolve-pr.outputs.head-sha }}"},
              "base": {"sha": "${{ needs.resolve-pr.outputs.base-sha }}"}
            }
          }
          EVEOF

      - name: Post trusted PR review via GitHub App
        run: |
          python3 scripts/github_review_helpers.py post-review \
            --event-path "/tmp/pr-event.json" \
            --input artifacts/reviewer/review-input.json \
            --output artifacts/reviewer/review-result.json
        env:
          GITHUB_APP_ID: ${{ secrets.OMG_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.OMG_APP_PRIVATE_KEY }}
          GITHUB_INSTALLATION_ID: ${{ secrets.OMG_APP_INSTALLATION_ID }}

      - name: Upload reviewer bot result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewer-bot-pr-result
          path: artifacts/reviewer
          if-no-files-found: error

  compat-gate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - compile-and-parity-compat
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Download assembled compat artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: compat-*
          path: artifacts
          merge-multiple: true

      - name: Run release readiness gate for public channel
        run: |
          READY_PROVIDERS="$(python3 -c 'from runtime.canonical_surface import get_canonical_hosts; print(",".join(get_canonical_hosts()))')"
          OMG_REQUIRE_HOST_PARITY_REPORT=1 \
          OMG_REQUIRE_EXEC_KERNEL_EVIDENCE=1 \
          OMG_REQUIRE_GOVERNED_TOOL_EVIDENCE=1 \
          OMG_REQUIRE_TRUSTED_POLICY_PACKS=1 \
          OMG_RELEASE_READY_PROVIDERS="${READY_PROVIDERS}" \
            python3 scripts/omg.py release readiness --channel public --output-root artifacts/public > artifacts/omg-release-readiness-public.json

      - name: Run host parity regression tests
        run: python3 -m pytest tests/runtime/test_host_parity.py -q --no-cov

      - name: Check standalone naming hygiene
        run: python3 scripts/check-omg-standalone-clean.py

      - name: Check public-readiness hygiene
        run: python3 scripts/check-omg-public-ready.py

      - name: Run fast regression tests
        run: python3 -m pytest -q --no-cov -m "not slow and not e2e"

      - name: Run slow and e2e regression tests
        run: python3 -m pytest -q --no-cov -m "slow or e2e"

      - name: Validate full release identity
        run: python3 scripts/validate-release-identity.py --scope all --forbid-version "${{ inputs.FORBID_VERSION }}"

      - name: Pack compatibility artifacts
        run: tar -czf omg-compat-artifacts.tar.gz -C artifacts .

      - name: Upload compatibility artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omg-compat-artifacts
          path: omg-compat-artifacts.tar.gz
          if-no-files-found: error

  standalone-no-vendor:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Validate standalone no-vendor behavior
        run: ./scripts/verify-standalone.sh
