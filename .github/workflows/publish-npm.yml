name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Publish @trac3er/oh-my-god to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Typecheck
        run: bun run typecheck

      - name: Run test suite
        run: bun test

      - name: Check runtime cleanliness
        run: bun run check:runtime-clean

      - name: Pack npm tarball
        run: npm pack --ignore-scripts | tee /tmp/omg-npm-pack.txt

      - name: Smoke install packed tarball
        run: |
          TARBALL="$(tail -n 1 /tmp/omg-npm-pack.txt)"
          test -n "$TARBALL"
          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          npm init -y >/dev/null 2>&1
          npm install "$GITHUB_WORKSPACE/$TARBALL"

      - name: Publish beta prerelease
        if: contains(github.ref_name, '-beta.')
        run: npm publish --tag beta --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish stable release
        if: ${{ !contains(github.ref_name, '-beta.') }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag stable release as latest
        if: ${{ !contains(github.ref_name, '-beta.') }}
        run: npm dist-tag add @trac3er/oh-my-god@${{ steps.version.outputs.VERSION }} latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
