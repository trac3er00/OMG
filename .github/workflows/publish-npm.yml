name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish @trac3er/oh-my-god to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${{ steps.version.outputs.VERSION }}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version match: $PKG_VERSION"

      - name: Sync version files to tag
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          python3 - "$VERSION" <<'PY'
          import json, sys
          from pathlib import Path

          version = sys.argv[1]

          # Sync plugin.json
          p = Path(".claude-plugin/plugin.json")
          d = json.loads(p.read_text())
          d["version"] = version
          p.write_text(json.dumps(d, indent=2) + "\n")
          print(f"  plugin.json → {version}")

          # Sync marketplace.json (3 version fields)
          p = Path(".claude-plugin/marketplace.json")
          d = json.loads(p.read_text())
          d["version"] = version
          if isinstance(d.get("metadata"), dict):
              d["metadata"]["version"] = version
          if isinstance(d.get("plugins"), list) and d["plugins"]:
              d["plugins"][0]["version"] = version
          p.write_text(json.dumps(d, indent=2) + "\n")
          print(f"  marketplace.json → {version}")
          PY

      - name: Publish to npm
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [[ "$VERSION" == *"-"* ]]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag @latest (stable releases only)
        if: "!contains(steps.version.outputs.VERSION, '-')"
        run: npm dist-tag add @trac3er/oh-my-god@${{ steps.version.outputs.VERSION }} latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
