name: Publish to npm
# RETIRED: release.yml handles automated semantic-release publish.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 2.1.8) — must match CANONICAL_VERSION in runtime/adoption.py"
        required: true
        type: string
      commit_sha:
        description: "Commit SHA to tag and publish (defaults to HEAD of main)"
        required: false
        type: string
        default: ""
      FORBID_VERSION:
        description: "Previous release version to block from residue checks"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-target:
    name: Resolve target release surface
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.target.outputs.sha }}
      version: ${{ steps.target.outputs.version }}
    steps:
      - name: Resolve target commit
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${{ inputs.commit_sha }}"
            if [ -z "$SHA" ]; then
              SHA=$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | cut -f1)
            fi
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

  compat-gate:
    name: Compat gate (publish surface)
    needs: resolve-target
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target surface
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Verify canonical release identity
        run: python3 scripts/sync-release-identity.py --check

      - name: Prepare compatibility artifacts directory
        run: mkdir -p artifacts

      - name: OMG compatibility GA gate
        run: python3 scripts/omg.py compat gate --max-bridge 0 --output artifacts/omg-compat-gap.json

      - name: Plugin interop diagnostics (advisory)
        continue-on-error: true
        run: python3 scripts/omg.py diagnose-plugins --format json

      - name: Export contract snapshot
        run: python3 scripts/omg.py compat snapshot --output artifacts/omg-compat-contracts.json

      - name: Check committed snapshot drift
        run: python3 scripts/check-omg-compat-contract-snapshot.py --strict-version

      - name: Validate canonical contract registry
        run: python3 scripts/omg.py contract validate

  release-readiness:
    name: Release readiness (publish surface)
    needs: resolve-target
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target surface
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Verify canonical release identity
        run: python3 scripts/sync-release-identity.py --check

      - name: Prepare artifact roots
        run: mkdir -p artifacts/release/.omg/evidence

      - name: Capture doctor output
        run: python3 scripts/omg.py doctor --format json > artifacts/release/.omg/evidence/doctor.json

      - name: Seed deterministic proof fixtures
        run: python3 scripts/prepare-release-proof-fixtures.py --output-root artifacts/release

      - name: Validate contract registry
        run: python3 scripts/omg.py contract validate

      - name: Compile public canonical-parity artifacts
        run: |
          HOST_FLAGS="$(python3 -c 'from runtime.canonical_surface import get_canonical_hosts; print(" ".join(f"--host {host}" for host in get_canonical_hosts()))')"
          python3 scripts/omg.py contract compile ${HOST_FLAGS} --channel public --output-root artifacts/release

      - name: Compile enterprise canonical-parity artifacts
        run: |
          HOST_FLAGS="$(python3 -c 'from runtime.canonical_surface import get_canonical_hosts; print(" ".join(f"--host {host}" for host in get_canonical_hosts()))')"
          python3 scripts/omg.py contract compile ${HOST_FLAGS} --channel enterprise --output-root artifacts/release

      - name: Run release readiness gate
        env:
          OMG_REQUIRE_HOST_PARITY_REPORT: "1"
          OMG_REQUIRE_EXEC_KERNEL_EVIDENCE: "1"
          OMG_REQUIRE_GOVERNED_TOOL_EVIDENCE: "1"
          OMG_REQUIRE_TRUSTED_POLICY_PACKS: "1"
          OMG_RELEASE_READY_PROVIDERS: claude,codex,gemini,kimi
        run: python3 scripts/omg.py release readiness --channel dual --output-root artifacts/release > artifacts/release/.omg/evidence/release-readiness.json

  publish:
    name: Publish @trac3er/oh-my-god to npm
    needs:
      - resolve-target
      - compat-gate
      - release-readiness
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.sha }}
          fetch-depth: 0

      - name: Pre-release tag safety check
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ needs.resolve-target.outputs.version }}"
          REPO="trac3r00/OMG"
          TAG="v${VERSION}"
          RESPONSE=$(gh api "repos/${REPO}/releases/tags/${TAG}" 2>&1 || true)
          if echo "$RESPONSE" | grep -q '"immutable": true'; then
            echo "FATAL: Tag ${TAG} was used by an immutable release (even if deleted)."
            echo "GitHub permanently locks this tag name. Bump the version and retry."
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}"; then
            echo "WARNING: Tag ${TAG} already exists on remote — tag creation will be skipped."
          else
            echo "OK: Tag ${TAG} is clear for creation."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag (workflow_dispatch only, if tag doesn't exist)
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          VERSION="${{ needs.resolve-target.outputs.version }}"
          SHA="${{ needs.resolve-target.outputs.sha }}"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "refs/tags/v${VERSION}"; then
            echo "Tag v${VERSION} already exists on remote — skipping tag creation"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}" "${SHA}" -m "Release v${VERSION} — published via workflow dispatch"
          git push origin "v${VERSION}" && echo "Created and pushed tag v${VERSION} at ${SHA}" || \
            echo "WARNING: Tag push failed (tag protection rule) — continuing with publish"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from target surface
        id: version
        run: echo "VERSION=${{ needs.resolve-target.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${{ steps.version.outputs.VERSION }}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version match: $PKG_VERSION"

      - name: Verify canonical version parity
        run: |
          TAG_VERSION=${{ steps.version.outputs.VERSION }}
          PKG_VERSION=$(node -p "require('./package.json').version")
          CANONICAL_VERSION=$(python3 scripts/print-canonical-version.py)
          echo "Tag: $TAG_VERSION | package.json: $PKG_VERSION | canonical: $CANONICAL_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$TAG_VERSION" != "$CANONICAL_VERSION" ]; then
            echo "ERROR: Version mismatch detected"
            echo "  tag:       $TAG_VERSION"
            echo "  package:   $PKG_VERSION"
            echo "  canonical: $CANONICAL_VERSION"
            exit 1
          fi
          echo "All three version sources match: $TAG_VERSION"

      - name: Validate full release identity
        run: python3 scripts/validate-release-identity.py --scope all --forbid-version "${{ inputs.FORBID_VERSION }}"

      - name: Validate contract
        run: python3 scripts/omg.py contract validate

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag @latest
        run: npm dist-tag add @trac3er/oh-my-god@${{ steps.version.outputs.VERSION }} latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
