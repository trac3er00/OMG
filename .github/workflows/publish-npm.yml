name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.1.8) — must match CANONICAL_VERSION in runtime/adoption.py'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA to tag and publish (defaults to HEAD of main)'
        required: false
        type: string
        default: ''

jobs:
  publish:
    name: Publish @trac3er/oh-my-god to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Resolve target commit
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${{ inputs.commit_sha }}"
            if [ -z "$SHA" ]; then
              SHA=$(git ls-remote origin refs/heads/main | cut -f1)
            fi
            echo "sha=$SHA" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.sha }}
          fetch-depth: 0

      - name: Pre-release tag safety check
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.target.outputs.version }}"
          REPO="trac3er00/OMG"
          TAG="v${VERSION}"
          # Fail fast if GitHub has an immutable release ghost for this tag
          RESPONSE=$(gh api "repos/${REPO}/releases/tags/${TAG}" 2>&1 || true)
          if echo "$RESPONSE" | grep -q '"immutable": true'; then
            echo "FATAL: Tag ${TAG} was used by an immutable release (even if deleted)."
            echo "GitHub permanently locks this tag name. Bump the version and retry."
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}"; then
            echo "WARNING: Tag ${TAG} already exists on remote — tag creation will be skipped."
          else
            echo "OK: Tag ${TAG} is clear for creation."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag (workflow_dispatch only, if tag doesn't exist)
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          VERSION="${{ steps.target.outputs.version }}"
          SHA="${{ steps.target.outputs.sha }}"
          # Skip if tag already exists on remote
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "refs/tags/v${VERSION}"; then
            echo "Tag v${VERSION} already exists on remote — skipping tag creation"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create annotated tag at the target commit
          git tag "v${VERSION}" "${SHA}" -m "Release v${VERSION} — published via workflow dispatch"
          git push origin "v${VERSION}" && echo "Created and pushed tag v${VERSION} at ${SHA}" || \
            echo "WARNING: Tag push failed (tag protection rule) — continuing with publish"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${{ steps.target.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${{ steps.version.outputs.VERSION }}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version match: $PKG_VERSION"

      - name: Verify canonical version parity
        run: |
          TAG_VERSION=${{ steps.version.outputs.VERSION }}
          PKG_VERSION=$(node -p "require('./package.json').version")
          CANONICAL_VERSION=$(python3 scripts/print-canonical-version.py)
          echo "Tag: $TAG_VERSION | package.json: $PKG_VERSION | canonical: $CANONICAL_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$TAG_VERSION" != "$CANONICAL_VERSION" ]; then
            echo "ERROR: Version mismatch detected"
            echo "  tag:       $TAG_VERSION"
            echo "  package:   $PKG_VERSION"
            echo "  canonical: $CANONICAL_VERSION"
            exit 1
          fi
          echo "All three version sources match: $TAG_VERSION"

      - name: Validate full release identity
        run: python3 scripts/validate-release-identity.py --scope all --forbid-version "${FORBID_VERSION:-}"
      - name: Validate contract
        run: python3 scripts/omg.py contract validate

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag @latest
        run: npm dist-tag add @trac3er/oh-my-god@${{ steps.version.outputs.VERSION }} latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
