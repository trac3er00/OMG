name: Host Parity
on:
  push:
    branches: [main, develop]
  pull_request:
permissions:
  contents: read
jobs:
  host-parity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test tests/host-parity/smoke.test.ts
