name: OMG Runtime Readiness

on:
  workflow_dispatch:
  pull_request:

jobs:
  runtime-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Prepare artifacts directory
        run: mkdir -p artifacts

      - name: Check legacy runtime drift
        run: bun scripts/check-runtime-clean.ts

      - name: Check compat snapshot drift
        run: bun scripts/check-omg-compat-contract-snapshot.ts

      - name: Run release readiness smoke
        run: bun scripts/omg.ts release readiness > artifacts/release-readiness.json

      - name: Run provider status smoke
        run: bun scripts/omg.ts providers status --smoke --host-mode claude_dispatch > artifacts/provider-status.json

      - name: Run test suite
        run: bun test

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Upload runtime readiness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omg-runtime-readiness
          path: artifacts/
          if-no-files-found: error
