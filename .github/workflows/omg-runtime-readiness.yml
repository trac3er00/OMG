name: OMG Runtime Readiness

on:
  workflow_dispatch:
  pull_request:

jobs:
  runtime-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest fastmcp starlette pyyaml

      - name: Prepare artifacts directory
        run: mkdir -p artifacts

      - name: Check source/build drift
        run: python3 scripts/check-source-build-drift.py > artifacts/source-build-drift.json

      - name: Check standalone naming hygiene
        run: python3 scripts/check-omg-standalone-clean.py > artifacts/standalone-clean.json

      - name: Run provider/runtime verification
        run: python3 -m pytest -q tests/runtime tests/scripts/test_omg_cli.py tests/e2e/test_provider_live_smoke.py tests/e2e/test_provider_native_entrypoints.py tests/e2e/test_runtime_long_horizon.py

      - name: Run hooks/security/performance verification
        run: python3 -m pytest -q tests/hooks tests/security tests/performance

      - name: Run qualification verification
        run: python3 -m pytest -q tests/e2e/test_runtime_long_horizon.py tests/performance/test_runtime_stress_budget.py

      - name: Run compat/HUD/theme/ecosystem verification
        run: python3 -m pytest -q tests/e2e/test_omg_hud.py tests/runtime/test_compat_dispatch.py tests/runtime/test_ecosystem.py tests/tools/test_theme_selector.py tests/tools/test_themes.py

      - name: Run full test suite
        run: python3 -m pytest -q

      - name: Upload runtime readiness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omg-runtime-readiness
          path: artifacts/
          if-no-files-found: error
