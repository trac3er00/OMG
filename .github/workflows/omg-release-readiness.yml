name: OMG Release Readiness

on:
  workflow_dispatch:
    inputs:
      FORBID_VERSION:
        description: "Previous release version to block from residue checks"
        required: true
        type: string
  pull_request:
  schedule:
    - cron: "13 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            setup.cfg
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Verify canonical release identity
        run: python3 scripts/sync-release-identity.py --check

      - name: Prepare artifact roots
        run: mkdir -p artifacts/release/.omg/evidence

      - name: Capture doctor output
        run: python3 scripts/omg.py doctor --format json > artifacts/release/.omg/evidence/doctor.json

      - name: Seed deterministic proof fixtures
        run: python3 scripts/prepare-release-proof-fixtures.py --output-root artifacts/release

      - name: Emit Music OMR daily gate evidence
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          from runtime.music_omr_testbed import MusicOMRTestbed

          output_root = Path("artifacts/release")
          evidence_root = output_root / ".omg" / "evidence"
          evidence_packs = sorted(evidence_root.glob("*.json"))

          release_pack_path = None
          release_pack = None
          for path in evidence_packs:
              try:
                  payload = json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  continue
              if isinstance(payload, dict) and payload.get("schema") == "EvidencePack":
                  release_pack_path = path
                  release_pack = payload

          if release_pack_path is None or not isinstance(release_pack, dict):
              raise SystemExit("release evidence pack missing")

          run_id = str(release_pack.get("run_id", "")).strip()
          if not run_id:
              raise SystemExit("release evidence pack run_id missing")

          fixture_dir = Path("tests/runtime/fixtures")
          score_fixtures = {
              "simple_c_major": fixture_dir / "music_omr" / "simple_c_major.json",
              "simple_g_major": fixture_dir / "music_omr" / "simple_g_major.json",
              "chromatic_fragment": fixture_dir / "music_omr" / "chromatic_fragment.json",
              "waltz_three_four": fixture_dir / "music_omr" / "waltz_three_four.json",
          }
          pressure_fixture = json.loads((fixture_dir / "chaos" / "transposition_pressure_fixture.json").read_text(encoding="utf-8"))

          testbed = MusicOMRTestbed(str(output_root))
          omr_results = {}
          for name, path in score_fixtures.items():
              omr_results[name] = testbed.run_omr(path)

          pressure = testbed.run_pressure_suite(
              omr_results["simple_c_major"],
              str(pressure_fixture.get("target_key", "G")),
              iterations=int(pressure_fixture.get("iterations", 64)),
              runtime_ceiling_seconds=float(pressure_fixture.get("max_runtime_seconds", 0.5)),
          )

          trace_id = f"trace-music-omr-daily-gate-{run_id}"
          all_results = {f"omr_{name}": result for name, result in omr_results.items()}
          all_results["pressure"] = pressure
          evidence_path = testbed.emit_evidence(
              run_id,
              all_results,
              trace_id=trace_id,
              fixture_inventory=[
                  "simple_c_major.json",
                  "simple_g_major.json",
                  "chromatic_fragment.json",
                  "waltz_three_four.json",
                  "transposition_pressure_fixture.json",
              ],
              freshness_max_age_seconds=86400,
          )
          evidence_payload = json.loads(Path(evidence_path).read_text(encoding="utf-8"))
          freshness = evidence_payload.get("freshness", {})
          if not isinstance(freshness, dict) or freshness.get("is_fresh") is not True:
              raise SystemExit("music omr daily gate emitted stale evidence")
          if evidence_payload.get("fixture_inventory_valid") is not True:
              raise SystemExit("music omr daily gate fixture inventory incomplete")
          if evidence_payload.get("run_id") != run_id:
              raise SystemExit("music omr daily gate run_id linkage mismatch")

          release_pack["music_omr_testbed_evidence"] = {
              "path": str(Path(evidence_path).relative_to(output_root)).replace("\\", "/"),
              "run_id": run_id,
          }
          release_pack["evidence_profile"] = str(release_pack.get("evidence_profile", "release") or "release")
          release_pack_path.write_text(json.dumps(release_pack, indent=2, ensure_ascii=True), encoding="utf-8")
          PY

      - name: Validate contract registry
        run: python3 scripts/omg.py contract validate

      - name: Sanitize colon filenames for upload
        run: find artifacts -type f -name '*:*' -not -path '*/bundle/plugins/advanced/commands/*' -delete 2>/dev/null || true

      - name: Upload foundation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-foundation
          path: artifacts/release
          if-no-files-found: error
          include-hidden-files: true

  compile-public:
    runs-on: ubuntu-latest
    needs: prepare-release-readiness
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            setup.cfg
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Download foundation artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-foundation
          path: artifacts/release

      - name: Compile public canonical-parity artifacts
        run: |
          HOST_FLAGS="$(python3 -c 'from runtime.canonical_surface import get_canonical_hosts; print(" ".join(f"--host {host}" for host in get_canonical_hosts()))')"
          python3 scripts/omg.py contract compile ${HOST_FLAGS} --channel public --output-root artifacts/release

      - name: Sanitize colon filenames for upload
        run: find artifacts -type f -name '*:*' -not -path '*/bundle/plugins/advanced/commands/*' -delete 2>/dev/null || true

      - name: Upload public compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-public-compiled
          path: artifacts/release
          if-no-files-found: error
          include-hidden-files: true

  compile-enterprise:
    runs-on: ubuntu-latest
    needs: prepare-release-readiness
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            setup.cfg
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Download foundation artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-foundation
          path: artifacts/release

      - name: Compile enterprise canonical-parity artifacts
        run: |
          HOST_FLAGS="$(python3 -c 'from runtime.canonical_surface import get_canonical_hosts; print(" ".join(f"--host {host}" for host in get_canonical_hosts()))')"
          python3 scripts/omg.py contract compile ${HOST_FLAGS} --channel enterprise --output-root artifacts/release

      - name: Sanitize colon filenames for upload
        run: find artifacts -type f -name '*:*' -not -path '*/bundle/plugins/advanced/commands/*' -delete 2>/dev/null || true

      - name: Upload enterprise compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-enterprise-compiled
          path: artifacts/release
          if-no-files-found: error
          include-hidden-files: true

  emit-host-parity:
    runs-on: ubuntu-latest
    needs: compile-public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            setup.cfg
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Download compiled public artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-public-compiled
          path: artifacts/release

      - name: Emit host semantic parity report
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          from runtime.host_parity import check_parity, emit_parity_report

          output_root = Path("artifacts/release")

          def _load_json(path: Path) -> dict:
              payload = json.loads(path.read_text(encoding="utf-8"))
              if not isinstance(payload, dict):
                  raise SystemExit(f"expected JSON object in {path}")
              return payload

          outputs = {
              "claude": {
                  "output": {
                      "status": "ok",
                      "compiled": True,
                  },
                  "source": {
                      "kind": "compiled_artifact",
                      "artifact_path": "settings.json",
                  },
                  "exit_code": 0,
              },
              "codex": {
                  "output": {
                      "status": "ok",
                      "compiled": True,
                  },
                  "source": {
                      "kind": "compiled_artifact",
                      "artifact_path": ".agents/skills/omg/AGENTS.fragment.md",
                  },
                  "exit_code": 0,
              },
              "gemini": {
                  "output": {
                      "status": "ok",
                      "compiled": True,
                  },
                  "source": {
                      "kind": "compiled_artifact",
                      "artifact_path": ".gemini/settings.json",
                  },
                  "exit_code": 0,
              },
              "kimi": {
                  "output": {
                      "status": "ok",
                      "compiled": True,
                  },
                  "source": {
                      "kind": "compiled_artifact",
                      "artifact_path": ".kimi/mcp.json",
                  },
                  "exit_code": 0,
              },
          }

          # Hard requirement: parity must be backed by real compiled host artifacts.
          _load_json(output_root / "settings.json")
          (output_root / ".agents" / "skills" / "omg" / "AGENTS.fragment.md").read_text(encoding="utf-8")
          _load_json(output_root / ".gemini" / "settings.json")
          _load_json(output_root / ".kimi" / "mcp.json")

          result = check_parity(outputs, context={"gate": "release-readiness-workflow"})
          emit_parity_report("release-readiness", result, project_dir=str(output_root))
          if not result.passed:
              raise SystemExit(f"host semantic parity drift detected: {result.drift_details}")
          PY

      - name: Sanitize colon filenames for upload
        run: find artifacts -type f -name '*:*' -not -path '*/bundle/plugins/advanced/commands/*' -delete 2>/dev/null || true

      - name: Upload host parity artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-host-parity
          path: artifacts/release
          if-no-files-found: error
          include-hidden-files: true

  release-readiness:
    runs-on: ubuntu-latest
    needs:
      - compile-public
      - compile-enterprise
      - emit-host-parity
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            setup.cfg
            requirements*.txt

      - name: Install Python dependencies
        run: pip install .[test]

      - name: Download assembled release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts/release
          merge-multiple: true

      - name: Restore canonical settings.json after artifact merge
        run: |
          cp settings.json artifacts/release/settings.json
          mkdir -p artifacts/release/.omg/evidence

      - name: Run release readiness gate
        env:
          OMG_REQUIRE_HOST_PARITY_REPORT: "1"
          OMG_REQUIRE_EXEC_KERNEL_EVIDENCE: "1"
          OMG_REQUIRE_GOVERNED_TOOL_EVIDENCE: "1"
          OMG_RELEASE_READY_PROVIDERS: claude,codex,gemini,kimi
        run: python3 scripts/omg.py release readiness --channel dual --output-root artifacts/release > artifacts/release/.omg/evidence/release-readiness.json

      - name: Assert execution primitive evidence surfaced
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("artifacts/release/.omg/evidence/release-readiness.json").read_text(encoding="utf-8"))
          from runtime.evidence_requirements import EVIDENCE_REQUIREMENTS_BY_PROFILE

          checks = payload.get("checks", {}).get("execution_primitives", {})
          required = {
              "release_run_coordinator_state",
              "tdd_proof_chain_lock",
              "rollback_manifest",
              "session_health_state",
              "council_verdicts",
              "forge_starter_proof",
              "music_omr_testbed_evidence",
              "exec_kernel_state",
              "worker_watchdog_replay",
              "merge_writer_provenance",
              "tool_fabric_ledger",
              "budget_envelope_state",
              "issue_report",
              "host_parity_report",
          }
          evidence_paths = checks.get("evidence_paths", {})
          missing = sorted(item for item in required if not str(evidence_paths.get(item, "")).strip())
          evidence_profile = str(payload.get("evidence_profile", "")).strip()
          if evidence_profile and evidence_profile not in EVIDENCE_REQUIREMENTS_BY_PROFILE:
              raise SystemExit(f"release readiness produced unknown evidence profile: {evidence_profile}")
          if evidence_profile in {"methodology-enforced", "hash-edit"}:
              raise SystemExit(f"release readiness used governed-tool-only profile: {evidence_profile}")
          if payload.get("status") != "ok":
              raise SystemExit("release readiness not ok")
          if missing:
              raise SystemExit(f"missing execution primitive evidence paths: {missing}")
          PY

      - name: Run public-readiness hygiene
        run: python3 scripts/check-omg-public-ready.py

      - name: Run standalone verification
        continue-on-error: true
        run: ./scripts/verify-standalone.sh

      - name: Run deterministic chaos matrix
        run: python3 -m pytest tests/runtime/test_release_chaos.py tests/perf/test_performance_v2.py tests/runtime/test_subagent_dispatcher.py tests/runtime/test_plugin_interop.py tests/runtime/test_background_verification.py -q

      - name: Validate full release identity
        run: python3 scripts/validate-release-identity.py --scope all --forbid-version "${{ inputs.FORBID_VERSION }}"

      - name: Build reviewer bot release handoff artifact
        run: |
          python3 scripts/github_review_helpers.py build-release-handoff \
            --event-path "$GITHUB_EVENT_PATH" \
            --artifacts-root artifacts/release \
            --output artifacts/release/.omg/evidence/reviewer-bot-release-input.json

      - name: Upload reviewer bot release handoff artifact
        uses: actions/upload-artifact@v4
        with:
          name: reviewer-bot-release-input
          path: artifacts/release/.omg/evidence/reviewer-bot-release-input.json
          if-no-files-found: error

      - name: Pack release artifacts
        run: tar -czf omg-release-artifacts.tar.gz -C artifacts release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omg-release-artifacts
          path: omg-release-artifacts.tar.gz
          if-no-files-found: error
