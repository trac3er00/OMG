name: Evidence Gate (Reusable)

on:
  workflow_call:
    inputs:
      repo-full-name:
        required: true
        type: string
      pr-number:
        required: true
        type: number
      head-sha:
        required: true
        type: string
    secrets:
      GITHUB_APP_ID:
        required: true
      GITHUB_APP_PRIVATE_KEY:
        required: true
      GITHUB_INSTALLATION_ID:
        required: true

jobs:
  post-review:
    runs-on: ubuntu-latest
    # TRUSTED LANE: runs from base SHA only (caller is responsible for this)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -e . --quiet

      - name: Post GitHub App review
        env:
          GITHUB_APP_ID: ${{ secrets.GITHUB_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          GITHUB_INSTALLATION_ID: ${{ secrets.GITHUB_INSTALLATION_ID }}
          OMG_REVIEWER_HANDOFF_PATH: artifacts/reviewer-bot-pr-input.json
        run: python3 scripts/github_review_helpers.py post-review
