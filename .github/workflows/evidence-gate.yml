name: Evidence Gate (Reusable)

on:
  workflow_call:
    inputs:
      repo-full-name:
        required: true
        type: string
      pr-number:
        required: true
        type: number
      head-sha:
        required: true
        type: string
    secrets:
      OMG_GITHUB_TOKEN:
        required: true

jobs:
  post-review:
    runs-on: ubuntu-latest
    # TRUSTED LANE: runs from base SHA only (caller is responsible for this)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -e . --quiet

      - name: Post trusted PR review
        env:
          OMG_GITHUB_TOKEN: ${{ secrets.OMG_GITHUB_TOKEN }}
          OMG_REVIEWER_HANDOFF_PATH: artifacts/reviewer-bot-pr-input.json
        run: |
          python3 scripts/github_review_helpers.py post-review \
            --event-path artifacts/reviewer-bot-pr-event.json \
            --input artifacts/reviewer-bot-pr-input.json \
            --output artifacts/reviewer-bot-pr-output.json
