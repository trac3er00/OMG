name: Feature request
description: Propose a user-facing improvement for OMG
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should OMG solve better?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest OMG-native solution
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification plan
      description: How should this be tested or evaluated?
    validations:
      required: false
