id: ast-pack
kind: governance
version: 2.1.9
title: OMG AST Pack Lane
description: Governed AST search and replace lane with canonical approvals and proofs.
hosts:
  - claude
  - codex
assets:
  references:
    - runtime/tool_fabric.py
    - registry/verify_artifact.py
invocation_policy:
  user_invocable: true
  model_invocable: true
  allow_implicit_invocation: false
tool_policy:
  side_effect_level: medium
  allowed_tools:
    claude:
      - Grep
      - Edit
    codex:
      - Grep
      - Edit
lifecycle_hooks:
  native:
    - PreToolUse
    - PostToolUse
  emulated:
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
    - typescript
evidence_outputs:
  artifacts:
    - .omg/evidence/ast-pack-{run_id}.json
execution_contract:
  modes:
    - embedded
    - local_supervisor
tool_fabric:
  lane: ast-pack
  enforcement_order:
    - tool_selection
    - approval_state
    - evidence_requirements
    - attestation_proof_validation
    - execution
  tools:
    - Grep
    - Edit
  semantic_operations:
    - name: ast_search
      tool: Grep
      mutation_capable: false
      requires_explicit_promotion: false
    - name: ast_rewrite
      tool: Edit
      mutation_capable: true
      requires_explicit_promotion: true
  requires_signed_approval: true
  requires_signed_approval_for_mutation: true
  requires_attestation: false
  requires_attestation_for_mutation: true
  dry_run_first: true
  require_run_scoped_evidence: true
  require_fresh_evidence: true
  evidence_max_age_seconds: 3600
  required_evidence:
    - .omg/evidence/ast-pack-{run_id}.json
channel_overrides:
  public:
    posture: advisory
  enterprise:
    posture: managed
