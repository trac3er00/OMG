id: ast-pack
kind: governance
version: 2.1.9
title: OMG AST Pack Lane
description: Governed AST search and replace lane with canonical approvals and proofs.
hosts:
  - claude
  - codex
assets:
  references:
    - runtime/tool_fabric.py
    - registry/verify_artifact.py
invocation_policy:
  user_invocable: true
  model_invocable: true
  allow_implicit_invocation: false
tool_policy:
  side_effect_level: medium
  allowed_tools:
    claude:
      - Grep
      - Edit
    codex:
      - Grep
      - Edit
lifecycle_hooks:
  native:
    - PreToolUse
    - PostToolUse
  emulated:
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
    - typescript
evidence_outputs:
  artifacts:
    - .omg/evidence/ast-pack.json
execution_contract:
  modes:
    - embedded
    - local_supervisor
tool_fabric:
  lane: ast-pack
  enforcement_order:
    - tool_selection
    - approval_state
    - evidence_requirements
    - attestation_proof_validation
    - execution
  tools:
    - Grep
    - Edit
  requires_signed_approval: true
  requires_attestation: false
  required_evidence:
    - .omg/evidence/ast-pack.json
channel_overrides:
  public:
    posture: advisory
  enterprise:
    posture: managed
