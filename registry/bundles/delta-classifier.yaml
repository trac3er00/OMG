id: delta-classifier
kind: routing
version: 2.2.9
title: OMG Delta Classifier
description: Change classifier that attaches risk-aware checks, approvals, and packs.
hosts:
  - claude
  - codex
assets:
  references:
    - runtime/delta_classifier.py
invocation_policy:
  user_invocable: true
  model_invocable: true
  allow_implicit_invocation: true
tool_policy:
  side_effect_level: low
  allowed_tools:
    claude:
      - Read
      - Grep
    codex:
      - Read
      - Grep
lifecycle_hooks:
  native:
    - SessionStart
  emulated:
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
evidence_outputs:
  artifacts:
    - .omg/tracebank/events.jsonl
execution_contract:
  modes:
    - embedded
    - local_supervisor
channel_overrides:
  public:
    classification: advisory
  enterprise:
    classification: required
