id: proof-gate
kind: proof
version: 2.3.0
title: OMG Proof Gate
description: Structured release proof gate that binds claims to required evidence artifacts and trace links.
hosts:
  - claude
  - codex
assets:
  references:
    - runtime/proof_gate.py
invocation_policy:
  user_invocable: true
  model_invocable: true
  allow_implicit_invocation: false
tool_policy:
  side_effect_level: low
  allowed_tools:
    claude:
      - Read
      - Grep
      - Bash(python3:*)
    codex:
      - Read
      - Grep
      - Bash(python3:*)
lifecycle_hooks:
  native:
    - PostToolUse
  emulated:
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
evidence_outputs:
  artifacts:
    - .omg/evidence/proof-gate-*.json
execution_contract:
  modes:
    - embedded
    - local_supervisor
channel_overrides:
  public:
    posture: self-serve
  enterprise:
    posture: managed
