id: lsp-pack
kind: diagnostics
version: 2.2.12
title: OMG LSP Pack
description: Optional LSP-backed diagnostics and navigation bundle for production verification.
hosts:
  - claude
  - codex
assets:
  references:
    - config/lsp_languages.yaml
    - tools/lsp_operations.py
invocation_policy:
  user_invocable: true
  model_invocable: true
  allow_implicit_invocation: false
tool_policy:
  side_effect_level: low
  allowed_tools:
    claude:
      - Read
      - Edit
    codex:
      - Read
      - Edit
lifecycle_hooks:
  native:
    - PostToolUse
  emulated:
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
    - javascript
    - typescript
evidence_outputs:
  artifacts:
    - .omg/evidence/lsp-pack-{run_id}.json
execution_contract:
  modes:
    - embedded
    - local_supervisor
tool_fabric:
  lane: lsp-pack
  enforcement_order:
    - tool_selection
    - approval_state
    - evidence_requirements
    - attestation_proof_validation
    - execution
  tools:
    - Read
    - Edit
  semantic_operations:
    - name: lsp_read_diagnostics
      tool: Read
      mutation_capable: false
      requires_explicit_promotion: false
    - name: lsp_promoted_edit
      tool: Edit
      mutation_capable: true
      requires_explicit_promotion: true
  requires_signed_approval: false
  requires_signed_approval_for_mutation: true
  requires_attestation: false
  requires_attestation_for_mutation: true
  read_only_by_default: true
  require_run_scoped_evidence: true
  require_fresh_evidence: true
  evidence_max_age_seconds: 3600
  required_evidence:
    - .omg/evidence/lsp-pack-{run_id}.json
channel_overrides:
  public:
    diagnostics: advisory
  enterprise:
    diagnostics: required
