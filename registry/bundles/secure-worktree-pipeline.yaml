id: secure-worktree-pipeline
kind: runtime
version: 2.3.0
title: OMG Secure Worktree Pipeline
description: Ephemeral worktree execution and supervisor-safe worker dispatch for production jobs.
hosts:
  - claude
  - codex
assets:
  references:
    - runtime/exec_kernel.py
    - runtime/subagent_dispatcher.py
    - runtime/merge_writer.py
    - hooks/branch_manager.py
invocation_policy:
  user_invocable: false
  model_invocable: true
  allow_implicit_invocation: false
tool_policy:
  side_effect_level: high
  allowed_tools:
    claude:
      - Read
      - Bash(git:*)
    codex:
      - Read
      - Bash(git:*)
lifecycle_hooks:
  native:
    - SessionStart
    - Stop
  emulated:
    - WorktreeCreate
    - WorktreeRemove
    - SubagentStart
    - SubagentStop
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
merge_writer_policy:
  lock_path: .omg/state/merge-writer.lock
  provenance_pattern: .omg/evidence/merge-writer-{run_id}.json
  readers: concurrent
  writers: exclusive
  mutation_requires:
    - worktree_isolation
    - merge_writer_lock
evidence_outputs:
  artifacts:
    - .omg/evidence/subagents/*.json
    - .omg/evidence/merge-writer-*.json
    - .omg/state/exec-kernel/*.json
    - .omg/state/merge-writer.lock
execution_contract:
  flags:
    - OMG_EXEC_KERNEL_ENABLED=false
  modes:
    - automation
    - ephemeral_worktree
    - local_supervisor
channel_overrides:
  public:
    worker_policy: local-only
  enterprise:
    worker_policy: managed-local
