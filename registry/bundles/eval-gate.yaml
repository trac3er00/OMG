id: eval-gate
kind: evaluation
version: 2.3.0
title: OMG Eval Gate
description: Reproducible evaluation gate that blocks regressions before release.
hosts:
  - claude
  - codex
assets:
  references:
    - runtime/eval_gate.py
invocation_policy:
  user_invocable: true
  model_invocable: true
  allow_implicit_invocation: false
tool_policy:
  side_effect_level: medium
  allowed_tools:
    claude:
      - Read
      - Bash(python3:*)
    codex:
      - Read
      - Bash(python3:*)
lifecycle_hooks:
  native:
    - PostToolUse
  emulated:
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
evidence_outputs:
  artifacts:
    - .omg/evals/latest.json
execution_contract:
  modes:
    - embedded
    - local_supervisor
channel_overrides:
  public:
    regressions: block
  enterprise:
    regressions: block
