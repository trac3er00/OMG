id: hook-governor
kind: governance
version: 2.1.7
title: OMG Hook Governor
description: Canonical hook ordering, policy reinjection, and protected-path governance.
hosts:
  - claude
  - codex
assets:
  references:
    - settings.json
    - hooks/pre-compact.py
invocation_policy:
  user_invocable: false
  model_invocable: false
  allow_implicit_invocation: true
tool_policy:
  side_effect_level: low
  allowed_tools:
    claude:
      - Read
    codex:
      - Read
lifecycle_hooks:
  native:
    - SessionStart
    - SessionEnd
    - PreToolUse
    - PostToolUse
    - PostToolUseFailure
    - Stop
  emulated:
    - PreCompact
    - ConfigChange
    - WorktreeCreate
    - WorktreeRemove
    - SubagentStart
    - SubagentStop
    - TaskCompleted
compiled_hooks:
  SessionStart:
    - command: python3 "$HOME/.claude/hooks/session-start.py"
      timeout: 10
  SessionEnd:
    - command: python3 "$HOME/.claude/hooks/session-end-capture.py"
  PreToolUse:
    - matcher: Bash
      command: python3 "$HOME/.claude/hooks/firewall.py"
      timeout: 10
    - matcher: Read|Write|Edit|MultiEdit
      command: python3 "$HOME/.claude/hooks/secret-guard.py"
      timeout: 10
    - matcher: ""
      command: python3 "$HOME/.claude/hooks/tdd-gate.py"
      timeout: 10
    - matcher: ""
      command: python3 "$HOME/.claude/hooks/pre-tool-inject.py"
  PostToolUse:
    - matcher: Bash
      command: python3 "$HOME/.claude/hooks/circuit-breaker.py"
      timeout: 10
    - matcher: Write|Edit|MultiEdit
      command: python3 "$HOME/.claude/hooks/tool-ledger.py"
      timeout: 10
    - matcher: Write|Edit|MultiEdit
      command: python3 "$HOME/.claude/hooks/test_generator_hook.py"
      timeout: 10
    - matcher: ""
      command: python3 "$HOME/.claude/hooks/budget_governor.py"
      timeout: 10
  PostToolUseFailure:
    - command: python3 "$HOME/.claude/hooks/post-tool-failure.py"
  Stop:
    - matcher: ""
      command: python3 "$HOME/.claude/hooks/stop_dispatcher.py"
      timeout: 90
feature_dependencies:
  defense-state:
    required_for:
      - hook-governor
      - tdd-gate
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
evidence_outputs:
  artifacts:
    - .omg/state/ledger/tool-ledger.jsonl
execution_contract:
  modes:
    - embedded
    - local_supervisor
channel_overrides:
  public:
    protected_paths:
      - .omg/**
      - .agents/**
  enterprise:
    protected_paths:
      - .omg/**
      - .agents/**
      - .claude/**
      - .codex/**
