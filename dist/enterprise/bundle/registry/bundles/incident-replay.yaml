id: incident-replay
kind: debugging
version: 2.3.0
title: OMG Incident Replay
description: Replayable bug packs built from logs, failing tests, traces, and diffs.
hosts:
  - claude
  - codex
assets:
  references:
    - runtime/incident_replay.py
invocation_policy:
  user_invocable: true
  model_invocable: true
  allow_implicit_invocation: false
tool_policy:
  side_effect_level: medium
  allowed_tools:
    claude:
      - Read
      - Bash(python3:*)
    codex:
      - Read
      - Bash(python3:*)
lifecycle_hooks:
  native:
    - PostToolUse
  emulated:
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
evidence_outputs:
  artifacts:
    - .omg/incidents/*.json
execution_contract:
  modes:
    - embedded
    - local_supervisor
channel_overrides:
  public:
    replay: available
  enterprise:
    replay: required
