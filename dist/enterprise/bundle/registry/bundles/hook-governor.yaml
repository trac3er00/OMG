id: hook-governor
kind: governance
version: 2.5.0
title: OMG Hook Governor
description: Hook ordering lane with injection-state checks and fail-closed precedence resolution across security, policy, and budget hooks.
hosts:
  - claude
  - codex
  - kimi
assets:
  references:
    - settings.json
    - hooks/pre-compact.py
invocation_policy:
  user_invocable: false
  model_invocable: false
  allow_implicit_invocation: true
tool_policy:
  side_effect_level: low
  allowed_tools:
    claude:
      - Read
    codex:
      - Read
lifecycle_hooks:
  native:
    - SessionStart
    - SessionEnd
    - PreToolUse
    - PostToolUse
    - PostToolUseFailure
    - Stop
  emulated:
    - PreCompact
    - ConfigChange
    - WorktreeCreate
    - WorktreeRemove
    - SubagentStart
    - SubagentStop
    - TaskCompleted
compiled_hooks:
  SessionStart:
    - command: '"$HOME/.claude/omg-runtime/.venv/bin/python" "$HOME/.claude/hooks/session-start.py"'
      timeout: 10
  SessionEnd:
    - command: '"$HOME/.claude/omg-runtime/.venv/bin/python" "$HOME/.claude/hooks/session-end-capture.py"'
  PreToolUse:
    - matcher: Bash
      command: '"$HOME/.claude/omg-runtime/.venv/bin/python" "$HOME/.claude/hooks/firewall.py"'
      timeout: 10
    - matcher: Read|Write|Edit|MultiEdit
      command: '"$HOME/.claude/omg-runtime/.venv/bin/python" "$HOME/.claude/hooks/secret-guard.py"'
      timeout: 10
    - matcher: ""
      command: '"$HOME/.claude/omg-runtime/.venv/bin/python" "$HOME/.claude/hooks/pre-tool-inject.py"'
    - matcher: ""
      command: '"$HOME/.claude/omg-runtime/.venv/bin/python" "$HOME/.claude/hooks/kimi-adapter.py"'
      timeout: 10
  PostToolUse:
    - matcher: Bash
      command: '"$HOME/.claude/omg-runtime/.venv/bin/python" "$HOME/.claude/hooks/circuit-breaker.py"'
      timeout: 10
    - matcher: Write|Edit|MultiEdit
      command: '"$HOME/.claude/omg-runtime/.venv/bin/python" "$HOME/.claude/hooks/tool-ledger.py"'
      timeout: 10
    - matcher: Write|Edit|MultiEdit
      command: '"$HOME/.claude/omg-runtime/.venv/bin/python" "$HOME/.claude/hooks/test_generator_hook.py"'
      timeout: 10
    - matcher: ""
      command: '"$HOME/.claude/omg-runtime/.venv/bin/python" "$HOME/.claude/hooks/budget_governor.py"'
      timeout: 10
    - matcher: ""
      command: '"$HOME/.claude/omg-runtime/.venv/bin/python" "$HOME/.claude/hooks/kimi-adapter.py"'
      timeout: 10
  PostToolUseFailure:
    - command: '"$HOME/.claude/omg-runtime/.venv/bin/python" "$HOME/.claude/hooks/post-tool-failure.py"'
  Stop:
    - matcher: ""
      command: '"$HOME/.claude/omg-runtime/.venv/bin/python" "$HOME/.claude/hooks/stop_dispatcher.py"'
      timeout: 90
feature_dependencies:
  defense-state:
    required_for:
      - hook-governor
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
evidence_outputs:
  artifacts:
    - .omg/state/ledger/tool-ledger.jsonl
execution_contract:
  modes:
    - embedded
    - local_supervisor
channel_overrides:
  public:
    protected_paths:
      - .omg/**
      - .agents/**
  enterprise:
    protected_paths:
      - .omg/**
      - .agents/**
      - .claude/**
      - .codex/**
