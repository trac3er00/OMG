id: api-twin
kind: simulation
version: 2.2.10
title: OMG API Twin
description: Versioned endpoint cassette replay with latency, drift, and cost reporting.
hosts:
  - claude
  - codex
assets:
  references:
    - runtime/api_twin.py
    - commands/OMG:api-twin.md
invocation_policy:
  user_invocable: true
  model_invocable: true
  allow_implicit_invocation: false
tool_policy:
  side_effect_level: medium
  allowed_tools:
    claude:
      - Read
      - Bash(python3:*)
    codex:
      - Read
      - Bash(python3:*)
lifecycle_hooks:
  native:
    - PostToolUse
  emulated:
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
evidence_outputs:
  artifacts:
    - .omg/state/api_twin.json
execution_contract:
  modes:
    - embedded
    - local_supervisor
channel_overrides:
  public:
    fidelity: validated
  enterprise:
    fidelity: policy-required
