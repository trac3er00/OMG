id: secure-worktree-pipeline
kind: runtime
version: 2.0.4
title: OMG Secure Worktree Pipeline
description: Ephemeral worktree execution and supervisor-safe worker dispatch for production jobs.
hosts:
  - claude
  - codex
assets:
  references:
    - runtime/subagent_dispatcher.py
    - hooks/branch_manager.py
invocation_policy:
  user_invocable: false
  model_invocable: true
  allow_implicit_invocation: false
tool_policy:
  side_effect_level: high
  allowed_tools:
    claude:
      - Read
      - Bash(git:*)
    codex:
      - Read
      - Bash(git:*)
lifecycle_hooks:
  native:
    - SessionStart
    - Stop
  emulated:
    - WorktreeCreate
    - WorktreeRemove
    - SubagentStart
    - SubagentStop
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
evidence_outputs:
  artifacts:
    - .omg/evidence/subagents/*.json
execution_contract:
  modes:
    - automation
    - ephemeral_worktree
    - local_supervisor
channel_overrides:
  public:
    worker_policy: local-only
  enterprise:
    worker_policy: managed-local
