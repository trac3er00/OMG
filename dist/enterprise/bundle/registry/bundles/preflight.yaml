id: preflight
kind: routing
version: 2.5.0
title: OMG Preflight
description: Deterministic preflight router that resolves ambiguous high-risk classifications to the strictest route with recorded evidence plan.
hosts:
  - claude
  - codex
assets:
  references:
    - runtime/preflight.py
    - runtime/delta_classifier.py
invocation_policy:
  user_invocable: true
  model_invocable: true
  allow_implicit_invocation: true
tool_policy:
  side_effect_level: low
  allowed_tools:
    claude:
      - Read
      - Grep
    codex:
      - Read
      - Grep
lifecycle_hooks:
  native:
    - SessionStart
  emulated:
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
evidence_outputs:
  artifacts:
    - .omg/tracebank/events.jsonl
execution_contract:
  modes:
    - embedded
    - local_supervisor
channel_overrides:
  public:
    routing: advisory
  enterprise:
    routing: enforced
