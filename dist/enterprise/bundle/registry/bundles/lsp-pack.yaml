id: lsp-pack
kind: diagnostics
version: 2.0.4
title: OMG LSP Pack
description: Optional LSP-backed diagnostics and navigation bundle for production verification.
hosts:
  - claude
  - codex
assets:
  references:
    - config/lsp_languages.yaml
    - tools/lsp_operations.py
invocation_policy:
  user_invocable: true
  model_invocable: true
  allow_implicit_invocation: false
tool_policy:
  side_effect_level: low
  allowed_tools:
    claude:
      - Read
    codex:
      - Read
lifecycle_hooks:
  native:
    - PostToolUse
  emulated:
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
    - javascript
    - typescript
evidence_outputs:
  artifacts:
    - .omg/evidence/lsp-diagnostics.json
execution_contract:
  modes:
    - embedded
    - local_supervisor
channel_overrides:
  public:
    diagnostics: advisory
  enterprise:
    diagnostics: required
