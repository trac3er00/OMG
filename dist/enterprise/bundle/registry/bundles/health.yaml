id: health
kind: domain-pack
version: 2.3.0
title: OMG Health Pack
description: Health-sensitive approvals, provenance, and replay attachments.
hosts:
  - claude
  - codex
assets:
  references:
    - runtime/domain_packs.py
invocation_policy:
  user_invocable: true
  model_invocable: true
  allow_implicit_invocation: false
tool_policy:
  side_effect_level: high
  allowed_tools:
    claude:
      - Read
    codex:
      - Read
lifecycle_hooks:
  native:
    - PostToolUse
  emulated:
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
evidence_outputs:
  artifacts:
    - .omg/lineage/*.json
execution_contract:
  modes:
    - embedded
    - local_supervisor
channel_overrides:
  public:
    approvals: required
  enterprise:
    approvals: enforced
