id: security-check
kind: security
version: 3.0.0
title: OMG Security Check
description: Security audit lane with waiver normalization, unresolved-high-risk fail conditions, and required remediation evidence refresh.
hosts:
  - claude
  - codex
assets:
  references:
    - runtime/security_check.py
    - commands/OMG:security-check.md
invocation_policy:
  user_invocable: true
  model_invocable: true
  allow_implicit_invocation: false
tool_policy:
  side_effect_level: medium
  allowed_tools:
    claude:
      - Read
      - Grep
      - Bash(python3:*)
    codex:
      - Read
      - Grep
      - Bash(python3:*)
lifecycle_hooks:
  native:
    - PostToolUse
  emulated:
    - TaskCompleted
mcp_contract:
  servers:
    - omg-control
lsp_contract:
  languages:
    - python
evidence_outputs:
  artifacts:
    - .omg/evidence/security-check-*.json
execution_contract:
  modes:
    - embedded
    - local_supervisor
channel_overrides:
  public:
    posture: self-serve
  enterprise:
    posture: managed
